---
# yamllint disable rule:line-length
format: 1
fltk:
  defaults:
    group: Libraries 
    overlay: base
    relstage: stable
    urls:
      - url: https://www.fltk.org/pub/${P}/${V_PKG}/${P}-${V_PKG}-source.tar.gz

  shasums:
    fltk-1.3.5-source.tar.gz: 8729b2a055f38c1636ba20f749de0853384c1d3e9d1a6b8d4d1305143e115702

  versions:
    1.3.5:
      variants:
        - overlay: base 
          target_cpus: [x86_64]
          systems: [.*.merlin7.psi.ch]
          relstage: stable
          configure_with: cmake
          configure_args:
            - "-DOPTION_CAIRO=ON"
            - "-DBUILD_SHARED_LIBS=ON"
        - overlay: base
          target_cpus: [aarch64]
          systems: [gpu0.*.merlin7.psi.ch]
          relstage: unstable
          configure_with: cmake
          configure_args:
            - "-DOPTION_CAIRO=OFF"
            - "-DBUILD_SHARED_LIBS=ON"

