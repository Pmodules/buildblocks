---
# yamllint disable rule:line-length
format: 1
amber:
  defaults:
    group: EM 
    overlay: base
    relstage: stable

  versions:
    26:
      variants:
        - overlay: Alps
          target_cpus: [x86_64]
          systems: [.*.merlin7.psi.ch]
          build_requires:
            - gcc/12.3.0
            - mpich/4.3.1
          relstage: stable
          runtime_deps:
            - gcc/12.3.0
            - mpich/4.3.1
        - overlay: Alps
          target_cpus: [aarch64]
          systems: [gpu0.*.merlin7.psi.ch]
          relstage: unstable
          build_requires:
            - gcc/12.3.0
            - mpich/4.3.1
          runtime_deps:
            - gcc/12.3.0
            - mpich/4.3.1
